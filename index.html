    <script>

        let wallet = 10000
        let prevnet = 10000
        let shares = 0
        let lastClose = 100

        window.onload = function () {

            const canvas = document.getElementById("Chart")

            let candles = []
            let st = Date.now()

            function createCandle(xTime) {
                let open = lastClose
                let high = open + Math.random() * 3
                let low = open - Math.random() * 3

                if (low < 1) {
                    low = 1
                }
                if (high <= low) {
                    high = low + 0.5
                }

                let close = low + Math.random() * (high - low)
                lastClose = close

                return {
                    x: xTime,
                    o: open,
                    h: high,
                    l: low,
                    c: close
                }
            }

            const CANDLE_STEP_MS = 1000
            let candleTime = Date.now() - (30 * CANDLE_STEP_MS)
            for (let i = 30; i > 0; i--) {
                candleTime += CANDLE_STEP_MS
                candles.push(createCandle(new Date(candleTime)))
            }

            let chart = new Chart(canvas, {
                type: 'candlestick',
                data: {
                    datasets: [{
                        data: candles,
                        barThickness: 12,
                        maxBarThickness: 18,
                    }]
                },
                options: {
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time' }
                    }
                }
            })

            const priceDisplay = document.getElementById("price-display")
            function updatePriceDisplay() {
                const shownPrice = Math.floor(lastClose)

                priceDisplay.innerText = "$" + shownPrice

                if (shownPrice < 100) {
                    priceDisplay.style.color = "#ff5f57"
                } else if (shownPrice === 100) {
                    priceDisplay.style.color = "#febc2e"
                } else {
                    priceDisplay.style.color = "#28c840"
                }
            }

            function updateMarket() {
                updateUI()
                candleTime += CANDLE_STEP_MS
                const nextCandle = createCandle(new Date(candleTime))
                updatePriceDisplay()

                candles.push(nextCandle)

                if (candles.length > 30) {
                    candles.shift()
                }

                chart.update("none")
               
            }

            updateMarket()
            setInterval(updateMarket, 1000)
            updatePriceDisplay()
         
        }

        function sell(){
              let qty = Number(document.getElementById("qty").value)

    if(qty <= 0){
        return
    }
    if (qty>shares){
        alert("Not enough shares")
        return   
     }
    let value = qty * lastClose
    wallet += value
    shares -= qty

    if (shares === 0) {
        avgPrice = 0
    }

    animateSell(value, true)

    updateUI()
        }

       

    </script>
