<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock-Rush</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="modulepreload" href="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    <link rel="preload" href="stock.glb" as="fetch" type="model/gltf-binary" crossorigin>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js" async></script>
</head>
<body>
    <img class="img" src="gradient.png">
    <div class="LayerBlur"></div>
<div class="container">
    <header>
        <h1>Stock Rush</h1>
        <nav>
            <a href="https://github.com/Aadarsh-1000/Stock-Rush">GitHub</a>
            
            <a href="index.html">Try Now</a>
        </nav>

    </header>
    <section>
        <h2>
            STOCK RUSH
        </h2>
       
        <p>Stock Rush is an interactive game that allows you to experience the thrill of trading with stcks for free with virtual money</p>
        <div class="getstarted">
            <a href="index.html"><button>
                Get Started
            </button></a>
        </div>
        <footer>
            Made with ❤️ from @Icecreamsandwich
        </footer>
    </section>

    <section class="model-section">
        <model-viewer
            class="stock-model"
            src="stock.glb"
            alt="Stock 3D model"
            camera-controls
            auto-rotate
            shadow-intensity="0.35"
            exposure="1.05"
            interaction-prompt="none"
            loading="eager">
        </model-viewer>
    </section>

</div>
</body>
<style>
    button{
        color: white;
        padding: 20px;
        border-radius: 20px;
        background-color: rgb(0, 0, 0);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
        margin-top: 20%;
        left: 16%;
        position: absolute;
        font-family: poppins;
        cursor: pointer;
    }
    button:hover{
        color: white;
        border-radius: 20px;
        background-color: rgb(0, 0, 0);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
        margin-top: 20%;
        left: 16%;
        position: absolute;
        font-family: poppins;
        cursor: pointer;
        transform: scale(1.1);
        transition: transform 0.2s ease-in;
    }
    footer{
        position: absolute;
        top: 95%;
        left: 45%;
    }
   
    p{
        position: absolute;
        margin-top: 12%;
        left: 16%;
        max-width: 500px;
    }
    h2{
        position: absolute;
        left: 16%;
        top: 34%;
    }
    .model-section{
        transform: translateX(45%);
    }
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box ;
        overflow: hidden;
    }
    body{
        font-family: "Poppins";
        line-height: 1.5;
        background-color: black;
        color: #e7e7e7;
        min-height: 100vh;
    }
    .img{
        opacity: 0.5;
        position: absolute;
        top: 0%;
        right: 0%;
        z-index: -1;
}
.LayerBlur{
    height: 0;
    width: 30rem;
    position: absolute;
    top: 20%;
    right: 0;
    box-shadow: 0 0 700px 15px white;
    rotate: -30deg;
    z-index: -1;
}
.container{
    width: 100%;
    margin: 2rem auto;
    padding: 0 2rem;
    position: relative;
    overflow: hidden;
}
header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 5rem;
}
header nav{
    display: flex;
    gap: 1.25rem;
}
header h1{
    margin: 0;
    font-size: 3rem;
    font-weight: 400;

}
nav{
    display: flex;
    align-items: center;
    gap: 3rem;
    margin-left: -5%;
    z-index:999;
    
}
nav a{
    font-size: 1rem;
    letter-spacing: 0.1rem;
    transition: color 0.2s ease, transform 0.2s ease, text-shadow 0.2s ease;
    text-decoration: none;
    color: inherit;
    color: white;
    display: inline-block;
    cursor: pointer;
    
}
nav a:hover{
    color: #cfc0c0;
   
}

.model-section{
    margin: 1.5rem auto 0;
    width: min(1080px, 94vw);
}

.stock-model{
    width: 100%;
    height: min(72vh, 620px);
    border: 0;
    border-radius: 14px;
    background: transparent;
}

@media (max-width: 900px){
    header{
        padding: 1rem 1.25rem;
    }

    nav{
        margin-left: 0;
        gap: 1.4rem;
    }

    .model-section{
        margin-top: 1rem;
    }

    .stock-model{
        height: min(62vh, 520px);
    }
}
</style>

</html>
