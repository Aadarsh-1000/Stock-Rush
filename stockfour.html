    <style>

 }

    <script>
               
let avgPrice = 0
let marketState = "calm"
let stateTicks = 0

        let wallet = 10000
        let prevnet = 10000
        let shares = 0
        let lastClose = 100

        window.onload = function () {

            const canvas = document.getElementById("Chart")

            let candles = []

            let chart = new Chart(canvas, {
                type: 'candlestick',
                data: {
                    datasets: [{
                        data: candles,
                        barThickness: 12,
                        maxBarThickness: 18,
                    }]
                },
                options: {
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time' }
                    }
                }
            })

            const priceDisplay = document.getElementById("price-display")
            function updatePriceDisplay() {
                const shownPrice = Math.floor(lastClose)

                priceDisplay.innerText = "$" + shownPrice

                if (shownPrice < 100) {
                    priceDisplay.style.color = "#ff5f57"
                } else if (shownPrice === 100) {
                    priceDisplay.style.color = "#febc2e"
                } else {
                    priceDisplay.style.color = "#28c840"
                }
            }

            function updateMarket() {
                chart.update()
                console.log("STATE:", marketState, "Ticks:", stateTicks)
                updateUI()
                let open = lastClose
                let high = open + Math.random() * 3
                let low = open - Math.random() * 3
                let close = low + Math.random() * (high - low)

                lastClose = close
                updatePriceDisplay()

                candles.push({
                    x: new Date(),
                    o: open,
                    h: high,
                    l: low,
                    c: close
                })

                if (candles.length > 50) {
                    candles.shift()
                }

                chart.update()
               
                

            }

            setInterval(updateMarket, 1500)
            updatePriceDisplay()
         
        }

        function sell(){
              let qty = Number(document.getElementById("qty").value)

    if(qty <= 0){
        return
    }
    if (qty>shares){
        alert("Not enough shares")
        return   
     }
    let value = qty * lastClose
    wallet += value
    shares -= qty

    if (shares === 0) {
        avgPrice = 0
    }

    animateSell(value, true)

    updateUI()
        }


if(stateTicks <= 0){
    r = Math.random()
    if(r < 0.9){
        let marketState = "crash"
        let stateTicks = 10
    }

    else if(r= 0.10){
        let marketState = "pump"
        let stateTicks = 10
    }

    else{
        marketState = "calm"
        stateTicks = 8
    }
    console.log("NEW STATE:", marketState)
}
stateTicks--

function animateCost(amount, isBuy) {
    const costText = document.getElementById("c1")
    if (!costText) {
        return
    }
    const sign = isBuy ? "-" : "+"
    costText.innerText = `${sign}$${amount.toFixed(2)}`
    costText.style.color = isBuy ? "#ff5f57" : "#28c840"
    costText.classList.remove("cost-float-animate")
    void costText.offsetWidth
    costText.classList.add("cost-float-animate")
}

function animateSell(amount, isSell) {
    const costText = document.getElementById("c1")
    if (!costText) {
        return
    }
    const sign = isSell ? "-" : "+"
    costText.innerText = `+${amount.toFixed(2)}`
    costText.style.color = "#28c840"
    costText.classList.remove("sell-float-animate")
    void costText.offsetWidth
    costText.classList.add("sell-float-animate")
}

function buy() {




    let qty = Number(document.getElementById("qty").value)

    if (qty <= 0) {
        alert("enter qty")
        return
    }
    let cost = qty * lastClose

    if (cost <= wallet) {
        const totalSharesBefore = shares
        wallet -= cost
        shares += qty

        avgPrice = ((totalSharesBefore * avgPrice) + (qty * lastClose)) / shares
        animateCost(cost, true)

    } else {
        alert("Not enough wallet")
    }


    updateUI()

}

function updateUI() {
    document.getElementById("wallet").innerText = wallet.toFixed(2)
    document.getElementById("shares").innerText = shares

    let net = wallet + (shares * lastClose)
    document.getElementById("networth").innerText = net.toFixed(2)

    pORl()


}
updateUI();
function pORl() {
    const pl = shares * (lastClose - avgPrice)
    const plValue = document.getElementById("pl")

    plValue.innerText = pl.toFixed(2)
    if (pl > 0) {
        plValue.style.color = "#28c840"
    } else if (pl < 0) {
        plValue.style.color = "#ff5f57"
    } else {
        plValue.style.color = "#febc2e"
    }

}
pORl()
    </script>
